<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Art Portfolio — Desk View</title>
  <link rel="stylesheet" href="./styles.css">
  <script src="./scripts/loader.js"></script>
  <script src="./scripts/layouts.js"></script>
  <script src="./scripts/desk-drag.js"></script>
</head>
<body>
  <header>
    <h1>My Art Portfolio</h1>
    <p>View: <a href="./index.html">Home</a> | <a href="./ver1.html">Grid</a> | <a href="./ver2.html">Clothesline</a> | <a href="./ver3.html">[Desk]</a> | <a href="./edit.html">Edit</a></p>
  </header>

  <main class="container">
    <div id="content"></div>
  </main>

  <script>
    window.appData.then(({ manifest }) => {
      const content = document.getElementById('content');

      manifest.collections.forEach((collection) => {
        const section = document.createElement('section');
        section.className = 'desk-collection';
        section.innerHTML = `<h2 class="desk-title">${collection.name}</h2>`;

        const surface = document.createElement('div');
        surface.className = 'desk-surface';
        section.appendChild(surface);
        content.appendChild(section);

        requestAnimationFrame(() => layoutDeskSurface(surface, collection.images));
      });
    });
  </script>
</body>
</html>
