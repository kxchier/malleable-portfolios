<svg viewBox="0 0 72 90" xmlns="http://www.w3.org/2000/svg">
  <!-- brass pole -->
  <g>
    <rect x="33.5" y="0" width="5" height="90" rx="2.5" fill="var(--color-accent,#d4a62a)" opacity=".7"/>
    <path d="M35 2v86" stroke="#fff4c9" stroke-width="1.2" opacity=".55"/>
    <path d="M37.8 2v86" stroke="#7a4d0e" stroke-width=".8" opacity=".5"/>
  </g>
  <g stroke-linecap="round" stroke-linejoin="round">
    <!-- ears (drawn first so the head covers their bases) -->
    <path d="M48 18 45 9l6 6Z" fill="currentColor" stroke="#4b2c1d" stroke-width="1.2"/>
    <path d="M53 17 57 7l2 7Z" fill="currentColor" style="fill:color-mix(in srgb,currentColor 65%,#241209)" stroke="#4b2c1d" stroke-width="1.2"/>
    <!-- far-side legs -->
    <g fill="none" stroke="currentColor" style="stroke:color-mix(in srgb,currentColor 65%,#241209)" stroke-width="4.5">
      <path d="M43 51c6 3 10 8 12 14"/>
      <path d="M22 56c-4 6-7 12-9 18"/>
    </g>
    <!-- tail -->
    <g fill="none" stroke="var(--color-paper,#f7dfad)" opacity=".9">
      <path d="M19 46c-9 2-13 10-11 19" stroke-width="4"/>
      <path d="M19 47c-6 5-8 13-6 21" stroke-width="3"/>
      <path d="M20 48c-4 7-4 14-1 22" stroke-width="2.2"/>
    </g>
    <!-- body + neck + head silhouette -->
    <path d="M66 29c1 2 0 4-3 4-3 0-5-1-7-3-1 3-3 6-4 9-1 2-2 4-4 6 4 3 5 8 2 12-4 5-14 8-22 6-8-2-13-8-11-15 1-4 4-6 8-7 5-1 11-1 15 2 1-7 3-16 7-23 1-3 3-4 5-4 5 0 10 6 14 13Z" fill="currentColor" stroke="#4b2c1d" stroke-width="1.3"/>
    <!-- belly shadow + back highlight -->
    <path d="M22 56c4 5 12 7 21 4-6 4-17 4-22-2Z" fill="#000" opacity=".14" stroke="none"/>
    <path d="M26 42c5-1.5 10-1.5 13 .5" fill="none" stroke="#fff" stroke-width="1.4" opacity=".22"/>
    <!-- near-side legs -->
    <g fill="none" stroke="currentColor" stroke-width="5">
      <path d="M46 52c5 5 8 11 9 18"/>
      <path d="M27 58c-2 6-3 13-3 20"/>
    </g>
    <!-- hooves -->
    <g fill="none" stroke="var(--color-accent,#c88719)" stroke-width="5.5">
      <path d="m55 70 2 4"/>
      <path d="m55 65 3 3"/>
      <path d="m24 78-1 4"/>
      <path d="m13 74-2 3"/>
    </g>
    <!-- mane + forelock -->
    <path d="M50 17c-4 6-7 15-8 26 0 4 0 7-1 10-3-1-5-4-5-7 1 1 2 1 3 1-2-4-3-8-2-12 1 1 2 1 3 1-1-5 0-10 3-15-2 0-3-1-3-2 3-3 6-4 10-2Z" fill="var(--color-paper,#f7dfad)" stroke="#4b2c1d" stroke-width=".8"/>
    <path d="M51 15c2-5 5-7 8-4-2 1-3 3-3 5Z" fill="var(--color-paper,#f7dfad)" stroke="#4b2c1d" stroke-width=".8"/>
    <!-- saddle blanket + seat -->
    <path d="M25 40c6-3 13-3 18 1l-2 10c-6-3-12-3-15-1Z" fill="var(--color-accent,#c88719)" stroke="#f7dfad" stroke-width="1"/>
    <path d="M29 39c3-3 8-3 11 0-1 2-2 4-2 7h-7c0-3-1-5-2-7Z" fill="#7e2d1e" stroke="#f7dfad" stroke-width=".8"/>
    <!-- girth + stirrup -->
    <path d="M33 49c0 6 0 11-1 15" fill="none" stroke="#6f301f" stroke-width="2.2"/>
    <path d="M36 48l1 9" fill="none" stroke="#6f301f" stroke-width="1.5"/>
    <circle cx="37.3" cy="59" r="2" fill="none" stroke="var(--color-accent,#c88719)" stroke-width="1.4"/>
    <!-- bridle + rein -->
    <path d="M57 19l3 9" fill="none" stroke="#6f301f" stroke-width="1.2"/>
    <path d="M60 26c2 1 4 3 4 5" fill="none" stroke="#6f301f" stroke-width="1.2"/>
    <path d="M62 31c-6 7-14 12-20 15" fill="none" stroke="#6f301f" stroke-width="1.1" opacity=".9"/>
    <!-- face details -->
    <circle cx="56" cy="21" r="1.4" fill="#180d09" stroke="none"/>
    <circle cx="56.5" cy="20.5" r=".4" fill="#fff" opacity=".8" stroke="none"/>
    <circle cx="63.5" cy="28.5" r=".9" fill="#2a140b" opacity=".85" stroke="none"/>
    <path d="M66 30c-1.5 1-2.5 1.5-3.5 1.5" fill="none" stroke="#4b2c1d" stroke-width="1"/>
  </g>
</svg>
