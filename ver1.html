<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Art Portfolio — Grid View</title>
  <link rel="stylesheet" href="./styles.css">
  <script src="./scripts/content.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./scripts/supabase-config.js"></script>
  <script src="./scripts/supabase-client.js"></script>
  <script src="./scripts/loader.js"></script>
  <script src="./scripts/component-registry.js"></script>
  <script src="./scripts/model-loader.js"></script>
  <script src="./scripts/decorations-runtime.js"></script>
  <script src="./scripts/render.js"></script>
</head>
<body>
  <header>
    <h1 data-text-id="portfolio.title" data-text-role="portfolio.title" data-text-fallback="My Art Portfolio">My Art Portfolio</h1>
  </header>

  <main class="container">
    <div id="content"></div>
  </main>

  <script>
    window.appData.then(async (data) => {
      const models = await PortfolioModels.load('grid', {
        theme: data.theme,
        contentOverrides: data.content,
        contentModel: data.contentModel,
      });
      await PortfolioRender.mount({
        root: document.getElementById('content'),
        presentationId: 'grid',
        models,
      });
    });
  </script>
</body>
</html>
