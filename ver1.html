<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Art Portfolio — Grid View</title>
  <link rel="stylesheet" href="./styles.css">
  <script src="./scripts/content.js"></script>
  <script src="./scripts/loader.js"></script>
  <script src="./scripts/organization.js"></script>
</head>
<body>
  <header>
    <h1 data-text-id="portfolio.title" data-text-role="portfolio.title" data-text-fallback="My Art Portfolio">My Art Portfolio</h1>
    <p><a href="./index.html">Home</a><span class="active-view">Grid</span><a href="./ver2.html">Clothesline</a><a href="./ver3.html">Desk</a><a href="./edit.html">Edit</a></p>
  </header>

  <main class="container">
    <div id="content"></div>
  </main>

  <script>
    window.appData.then(({ manifest, theme, content }) => {
      const root = document.getElementById('content');

      function renderCollections(collections) {
        root.innerHTML = '';

        collections.forEach((collection) => {
          const section = document.createElement('section');
          const h2 = document.createElement('h2');
          if (collection.originalIndex == null) {
            h2.textContent = collection.name;
          } else {
            const cid = PortfolioContent.collectionId(collection.originalIndex);
            h2.dataset.textId = cid;
            h2.dataset.textRole = 'collection.title';
            h2.dataset.textFallback = collection.name;
          }
          section.appendChild(h2);

          const grid = document.createElement('div');
          grid.className = 'grid-view';

          collection.images.forEach(img => {
            const item = document.createElement('div');
            item.className = 'grid-item';
            item.innerHTML = `<img src="${img}" alt="artwork" onerror="this.remove()">`;
            grid.appendChild(item);
          });

          section.appendChild(grid);
          root.appendChild(section);
        });

        PortfolioContent.applyPageText(manifest, theme, content, 'grid');
      }

      const controls = PortfolioOrganization.createControls({
        manifest,
        content,
        onChange: renderCollections,
      });
      root.parentNode.insertBefore(controls, root);
    });
  </script>
</body>
</html>
