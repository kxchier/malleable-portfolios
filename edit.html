<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Art Portfolio — Editor</title>
  <link rel="stylesheet" href="./styles.css?v=single-preview-20260713">
  <link rel="stylesheet" href="./edit-mode.css?v=single-preview-20260713">
  <script src="./scripts/content.js?v=single-preview-20260713"></script>
  <script src="./scripts/palette-colors.js?v=single-preview-20260713"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./scripts/supabase-config.js?v=single-preview-20260713"></script>
  <script src="./scripts/supabase-client.js?v=single-preview-20260713"></script>
  <script src="./scripts/loader.js?v=single-preview-20260713"></script>
</head>
<body class="edit-mode">
  <header class="edit-header">
    <div class="edit-toolbar">
      <div class="toolbar-row">
        <h1>Edit Mode</h1>
        <div class="edit-controls">
          <input id="supabase-username" class="supabase-field" type="text" placeholder="username" aria-label="Portfolio username">
          <button id="supabase-login-btn" class="ghost-btn" type="button">Use username</button>
          <button id="supabase-logout-btn" class="ghost-btn" type="button" hidden>Logout</button>
          <button id="delete-layout-btn" class="ghost-btn delete-layout-btn" type="button" hidden>Delete layout</button>
          <button id="collections-btn" class="ghost-btn collections-toggle-btn" type="button">Collections</button>
          <button id="inspect-btn" class="inspect-toggle-btn" type="button">Inspect model</button>
          <button id="save-btn">Save Changes</button>
          <button id="preview-btn">Preview</button>
        </div>
        <p id="supabase-status" class="supabase-status" hidden></p>
      </div>
    </div>
  </header>

  <main class="edit-container" id="edit-container">
    <aside class="design-sidebar" aria-label="Design space navigation">
      <section class="design-space-panel" aria-label="Design space instrument">
        <div class="design-space-head">
          <strong>Design Space</strong>
          <div class="design-space-head-actions">
            <button id="expand-design-space" class="ghost-btn design-space-expand-btn" type="button">Expand</button>
            <button id="hide-design-space" class="ghost-btn design-space-hide-btn" type="button">Hide</button>
          </div>
        </div>
        <div class="design-space-wrap">
          <span class="axis-label axis-label--top">Skeuomorphic</span>
          <span class="axis-label axis-label--bottom">Abstract</span>
          <span class="axis-label axis-label--left">Visible</span>
          <span class="axis-label axis-label--right">Friction</span>
          <div id="design-space" class="design-space" role="button" tabindex="0" aria-label="Choose design space position">
            <span class="axis-line axis-line--x" aria-hidden="true"></span>
            <span class="axis-line axis-line--y" aria-hidden="true"></span>
            <span id="design-space-selection" class="design-space-selection" aria-hidden="true"></span>
          </div>
        </div>
        <div id="design-space-legend" class="design-space-legend" aria-label="Template positions"></div>
        <div class="sidebar-axis-panel" aria-label="Design-space axes">
          <div class="sidebar-axis-head">Axes</div>
          <div id="sidebar-axis-list" class="sidebar-axis-list"></div>
        </div>
      </section>
    </aside>
    <button id="show-design-space" class="show-design-space-btn" type="button" hidden aria-label="Show design space">
      <span class="show-design-space-btn__arrow" aria-hidden="true">›</span>
      <span class="show-design-space-btn__glyph" aria-hidden="true">
        <span></span>
      </span>
      <span class="show-design-space-btn__text">Design space</span>
    </button>

    <section id="design-space-expanded" class="design-space-expanded" hidden aria-label="Expanded design space">
      <div class="design-space-expanded-head">
        <h2>Design Space</h2>
        <button id="collapse-design-space" class="ghost-btn" type="button">Close</button>
      </div>
      <div class="design-space-expanded-body">
        <section class="design-space-panel design-space-panel--expanded" aria-label="Expanded design space instrument">
          <div class="design-space-wrap design-space-wrap--expanded">
            <span class="axis-label axis-label--top">Skeuomorphic</span>
            <span class="axis-label axis-label--bottom">Abstract</span>
            <span class="axis-label axis-label--left">Visible</span>
            <span class="axis-label axis-label--right">Friction</span>
            <div id="expanded-design-space" class="design-space design-space--expanded" role="button" tabindex="0" aria-label="Choose design space position">
              <span class="axis-line axis-line--x" aria-hidden="true"></span>
              <span class="axis-line axis-line--y" aria-hidden="true"></span>
              <span id="expanded-design-space-selection" class="design-space-selection" aria-hidden="true"></span>
            </div>
          </div>
          <div id="expanded-design-space-legend" class="design-space-legend design-space-legend--expanded" aria-label="Template positions"></div>
        </section>
        <aside class="design-space-expanded-controls" aria-label="Design space controls">
          <section class="custom-axis-panel" aria-label="Custom design-space axes">
            <div class="custom-axis-head">
              <strong>Axes</strong>
              <button id="add-design-axis" class="ghost-btn" type="button">Add axis</button>
            </div>
            <div id="custom-axis-list" class="custom-axis-list"></div>
          </section>
          <section class="generate-panel" aria-label="Generate interface">
            <div class="generate-panel-head">
              <strong>Generate</strong>
            </div>
            <div class="prompt-examples" id="prompt-examples"></div>
            <div class="image-vibe-panel" id="image-vibe-panel">
              <input id="image-vibe-input" type="file" accept="image/png,image/jpeg,image/webp,image/gif" hidden>
              <button id="image-vibe-pick" class="ghost-btn image-vibe-pick" type="button">Add image</button>
              <button id="image-vibe-analyze" class="ghost-btn image-vibe-analyze" type="button" disabled>Extract vibe</button>
              <div id="image-vibe-preview" class="image-vibe-preview" hidden></div>
              <div id="image-vibe-tokens" class="image-vibe-tokens" hidden></div>
            </div>
            <div id="design-direction-card" class="design-direction-card" hidden></div>
            <textarea id="ai-prompt" rows="5" placeholder="Describe a portfolio interface for this point"></textarea>
            <div id="generate-questions" class="generate-questions" hidden></div>
            <p id="generate-status" class="generate-status" hidden></p>
            <button id="generate-btn" class="publish-btn">Generate version</button>
          </section>
        </aside>
      </div>
    </section>

    <div class="edit-workspace">
    <div class="preview-toolbar">
      <div class="palette-strip" id="palette-strip" title="Click a swatch to open the color pad — drag for hue &amp; lightness, or use sliders."></div>
      <div class="preview-gap" title="Spacing between images">
        <label for="grid-gap">Gap</label>
        <input type="range" id="grid-gap" min="8" max="40" value="32">
        <span id="grid-gap-display">32px</span>
      </div>
      <div class="preview-gap" title="Size of artwork thumbnails">
        <label for="art-size">Size</label>
        <input type="range" id="art-size" min="120" max="320" value="190">
        <span id="art-size-display">190px</span>
      </div>
      <div class="preview-gap metadata-display-control" title="Show text metadata saved beside artwork">
        <label for="metadata-display">Metadata</label>
        <select id="metadata-display">
          <option value="none">Hidden</option>
          <option value="below">Below</option>
          <option value="side">Side</option>
          <option value="overlay">Overlay</option>
        </select>
      </div>
      <div class="preview-gap social-prototype-control" title="Choose demo social interactions for this site version">
        <label for="social-prototype">Social</label>
        <select id="social-prototype">
          <option value="none">Off</option>
          <option value="all">All</option>
          <option value="likes">Likes</option>
          <option value="comments">Comments</option>
          <option value="likes-comments">Likes + comments</option>
          <option value="notes">Page notes</option>
        </select>
      </div>
      <div id="preview-reference-chip" class="preview-reference-chip" hidden></div>
    </div>
    <section class="preview-area">
      <div id="device-frame" class="device-frame desktop">
        <div class="device-bar">
          <span class="dot"></span><span class="dot"></span><span class="dot"></span>
          <span class="device-size" id="device-size">Desktop</span>
        </div>
        <div id="preview-frame"></div>
      </div>
      <button id="asset-assistant-btn" class="sparkle-btn portfolio-scope-sparkle" type="button" aria-label="Ask AI to change this portfolio" title="Ask AI to change this portfolio">
        <span class="sparkle-btn__icon" aria-hidden="true">✦</span>
      </button>
      <div id="cursor-undo-toast" class="cursor-undo-toast" hidden>
        <span>Applied local edit.</span>
        <button id="cursor-undo-btn" type="button">Undo</button>
        <button id="cursor-done-btn" type="button" aria-label="Dismiss">Done</button>
      </div>
      <div id="asset-review-toast" class="asset-review-toast" hidden>
        <span id="asset-review-message">Previewing page edit.</span>
        <button id="asset-review-undo" type="button">Undo</button>
        <button id="asset-review-apply" type="button">Apply</button>
      </div>
      <aside id="collections-panel" class="collections-panel" hidden aria-label="Collections for this site">
        <div class="collections-panel-head">
          <div>
            <h2>Site collections</h2>
            <p id="collections-panel-subtitle">This site version</p>
          </div>
          <button id="collections-close" class="asset-assistant-icon" type="button" aria-label="Close">&times;</button>
        </div>
        <div class="collections-panel-actions">
          <button id="collections-add" class="ghost-btn" type="button">Add collection</button>
          <button id="collections-reset" class="ghost-btn" type="button">Reset version</button>
        </div>
        <div id="collections-list" class="collections-list"></div>
      </aside>
    </section>
    </div>

    <aside id="inspect-panel" class="inspect-panel" hidden aria-label="Model inspector">
    </aside>
  </main>

  <div id="asset-assistant-modal" class="modal-overlay asset-assistant-modal" hidden>
    <form class="modal asset-assistant-card" id="asset-assistant-form">
      <div class="asset-assistant-head">
        <div>
          <h2>Ask AI</h2>
          <p>Current portfolio version</p>
        </div>
        <button id="asset-assistant-close" class="asset-assistant-icon" type="button" aria-label="Close">&times;</button>
      </div>
      <textarea id="asset-assistant-prompt" rows="3" placeholder="Make the whole page more colorful, add soft background stars, change the scrolling..."></textarea>
      <p id="asset-assistant-status" class="generate-status" hidden></p>
      <div class="asset-assistant-actions">
        <button id="asset-assistant-undo" class="ghost-btn asset-assistant-undo" type="button" hidden>Undo</button>
        <button id="asset-assistant-cancel" class="ghost-btn" type="button">Cancel</button>
        <button id="asset-assistant-submit" class="publish-btn" type="submit">Apply change</button>
      </div>
    </form>
  </div>

  <script src="./scripts/layouts.js?v=single-preview-20260713"></script>
  <script src="./scripts/inspect-model.js?v=single-preview-20260713"></script>
  <script src="./scripts/edit-mode.js?v=single-preview-20260713"></script>
</body>
</html>
