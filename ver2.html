<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Art Portfolio — Clothesline View</title>
  <link rel="stylesheet" href="./styles.css">
  <script src="./scripts/loader.js"></script>
</head>
<body>
  <header>
    <h1>My Art Portfolio</h1>
    <p>View: <a href="./index.html">Home</a> | <a href="./ver1.html">Grid</a> | <a href="./ver2.html">[Clothesline]</a> | <a href="./ver3.html">Desk</a> | <a href="./edit.html">Edit</a></p>
  </header>

  <main class="container">
    <div id="content"></div>
  </main>

  <script>
    window.appData.then(({ manifest, theme }) => {
      const content = document.getElementById('content');
      
      manifest.collections.forEach(collection => {
        const section = document.createElement('section');
        section.className = 'collection-strip';
        section.innerHTML = `<h2 class="strip-title">${collection.name}</h2>`;
        
        const scrollContainer = document.createElement('div');
        scrollContainer.className = 'images-scroll';
        
        collection.images.forEach(img => {
          const item = document.createElement('div');
          item.className = 'scroll-item';
          item.innerHTML = `<img src="${img}" alt="artwork" onerror="this.remove()">`;
          scrollContainer.appendChild(item);
        });
        
        section.appendChild(scrollContainer);
        content.appendChild(section);
      });
    });
  </script>
</body>
</html>
